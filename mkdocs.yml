site_name: justatom
site_description: Neural retrieval, indexing, training, and evaluation toolkit.

theme:
  name: material
  logo: Logo.png
  favicon: Logo.png
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: teal
      accent: amber
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: teal
      accent: amber

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Launch Guide: launch-guide.md
  - Architecture: architecture.md
  - Modules:
    - Overview: modules/index.md
    - API CLI: modules/api-cli.md
    - Runtime: modules/runtime.md
    - Data Processing: modules/data-processing.md
    - Storage: modules/storage.md
    - Modeling: modules/modeling.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css
