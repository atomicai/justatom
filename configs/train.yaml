dataset:
  # Optional preset name. If set, loader will try configs/dataset/<id>.yaml.
  id: null
  name_or_path: null
  labels_field: queries
  content_field: content
  split: null
  limit: null
  chunk_id_col: null
  keywords_col: null
  keywords_nested_col: null
  explanation_nested_col: null

filters:
  fields: null

add_alpha_gate: false

alpha_gate:
  enabled: false
  mode: augment
  train_only: true
  mix_weight: 0.3
  mix_weight_warmup_steps: 0
  auxiliary:
    simcse_dropout_weight: 0.1
    soft_fn_attract_weight: 0.0
    soft_fn_topk: 1
  alpha_query:
    input: query
    layers: 1
    hidden_dim: auto
    dropout: 0.0
    activation: gelu
    residual:
      enabled: false
      prior: 0.5
      scale: 0.25

model:
  name: intfloat/multilingual-e5-small

training:
  loss: contrastive
  num_samples: 100
  batch_size: 4
  max_seq_len: 512
  n_epochs: 1
  freeze_encoder: true
  gamma_joint: false
  include_semantic_gamma: true
  include_keywords_gamma: true
  alpha_entropy_weight: 0.0
  alpha_train_only: false
  alpha_mix_weight: 0.3
  alpha_mix_weight_warmup_steps: 0
  query_diagonal_gate: false
  query_diagonal_gate_scale: 0.25
  query_diagonal_gate_mode: raw
  query_diagonal_identity_weight: 0.0
  query_diagonal_saturation_weight: 0.0
  activation_fn: sigmoid
  margin: 0.5
  contrastive_temperature: 0.03
  soft_contrastive_temperature: 1.0
  grad_acc_steps: 6
  optimizer: adamw
  max_negative_inverse_idf_recall: null
  memory_bank_size: 0
  memory_bank_warmup_steps: 0
  memory_bank_mining_mode: all
  memory_bank_hard_negatives: 0
  memory_bank_random_negatives: 0
  memory_bank_hard_warmup_steps: 0
  memory_bank_hard_ramp_steps: 1
  memory_bank_too_hard_margin: null
  min_negative_inverse_idf_recall: null
  negative_sampling_mode: safe-random
  hard_negative_top_k: null
  focal_gamma: 2.0
  lr_gamma: 0.01
  lr_encoder: 0.00002
  weight_decay: 0.01

output:
  save_dir: null
  metrics_path: null

logging:
  backend: csv
  wandb_project: justatom-gamma
  wandb_run_name: null
